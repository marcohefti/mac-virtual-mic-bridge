name: ci

on:
  push:
  pull_request:

jobs:
  swift-validate:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Swift + Fixtures
        run: ./scripts/validate-swift.sh

  driver-build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HAL Driver Build
        run: ./scripts/validate-driver-build.sh

  release-artifacts-smoke:
    runs-on: macos-latest
    needs:
      - swift-validate
      - driver-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Release Artifact Packaging
        run: ./scripts/validate-release-artifacts.sh
